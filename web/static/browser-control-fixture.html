<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Sidekick Browser Control Fixture</title>
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ea;
      color: #172026;
    }
    body {
      margin: 0;
      min-height: 1600px;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 183, 77, .28), transparent 28rem),
        linear-gradient(135deg, #fffaf0 0%, #eef7f1 100%);
    }
    main {
      width: min(760px, calc(100vw - 48px));
      margin: 64px auto;
      padding: 28px;
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(23, 32, 38, .14);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(45, 64, 75, .16);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 54px);
      line-height: .95;
      letter-spacing: -.05em;
    }
    p {
      max-width: 58ch;
      color: #52616b;
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 22px 0 8px;
      font-weight: 700;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #bac7c9;
      border-radius: 14px;
      font: inherit;
      background: #fff;
      color: #172026;
    }
    button {
      margin-top: 14px;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: #0f766e;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    output {
      display: block;
      margin-top: 22px;
      padding: 16px;
      border-radius: 16px;
      background: #102a2a;
      color: #d9fff8;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      white-space: pre-wrap;
    }
    .scroll-target {
      margin-top: 900px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(15, 118, 110, .12);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Browser control fixture</h1>
    <p>This local page verifies that the Sidekick browser runtime can type into a field, click a button, scroll the rendered page, and expose the result back to the agent.</p>
    <label for="fixtureInput">Agent input</label>
    <input id="fixtureInput" name="fixtureInput" autocomplete="off" placeholder="Type here">
    <button id="fixtureButton" type="button">Apply fixture action</button>
    <output id="fixtureResult" aria-live="polite">typed: none
clicks: 0</output>
    <div class="scroll-target" id="fixtureScrollTarget">Scroll target reached</div>
  </main>
  <script>
    (function () {
      var input = document.getElementById('fixtureInput');
      var button = document.getElementById('fixtureButton');
      var result = document.getElementById('fixtureResult');
      var clicks = 0;
      function render() {
        result.textContent = 'typed: ' + (input.value || 'none') + '\nclicks: ' + clicks;
      }
      input.addEventListener('input', render);
      button.addEventListener('click', function () {
        clicks += 1;
        render();
      });
      render();
    })();
  </script>
</body>
</html>
