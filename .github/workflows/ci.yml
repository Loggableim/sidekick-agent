name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"

      - name: CLI smoke test
        run: |
          sidekick --help > /dev/null 2>&1 && echo "CLI help: OK" || echo "CLI help: FAIL"
          sidekick --version > /dev/null 2>&1 && echo "CLI version: OK" || echo "CLI version: FAIL"

      - name: Python import smoke test
        run: |
          python -c "
          import sys
          import cli.cli
          import run_agent
          from tools.registry import registry
          n = len(registry._snapshot_entries())
          print(f'tools: {n}')
          print('ALL IMPORTS OK')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[all]"
      - name: Check syntax
        run: |
          python -m py_compile run_agent.py
          python -m py_compile sidekick_app/__main__.py
          python -c "
          import glob, py_compile
          for f in glob.glob('cli/*.py') + glob.glob('shared/*.py') + glob.glob('runtime/*.py'):
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  print(f'SYNTAX ERROR: {f}: {e}')
          print('Syntax check done')
          "